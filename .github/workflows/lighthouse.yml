name: Lighthouse CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure "lighthouse" label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "lighthouse" \
            --color "F4A261" \
            --description "Automated Lighthouse CI regression findings" \
            2>/dev/null || true

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://nestcalc.ai/
          uploadArtifacts: true
          temporaryPublicStorage: false
          runs: 1

      - name: Parse scores and check thresholds
        id: check
        run: |
          REPORT=$(ls .lighthouseci/lhr-*.json 2>/dev/null | head -1)
          if [ -z "$REPORT" ]; then
            echo "No Lighthouse report found."
            exit 0
          fi

          export REPORT_FILE="$REPORT"
          node << 'EOF'
          const fs = require('fs');

          const r    = JSON.parse(fs.readFileSync(process.env.REPORT_FILE, 'utf8'));
          const cats = r.categories;

          const perf = Math.round(cats.performance.score * 100);
          const a11y = Math.round(cats.accessibility.score * 100);
          const bp   = Math.round(cats['best-practices'].score * 100);
          const seo  = Math.round(cats.seo.score * 100);

          const lcp  = Math.round(r.audits['largest-contentful-paint'].numericValue);
          const fcp  = Math.round(r.audits['first-contentful-paint'].numericValue);
          const tbt  = Math.round(r.audits['total-blocking-time'].numericValue);
          const cls  = r.audits['cumulative-layout-shift'].numericValue.toFixed(3);

          const checks = [
            ['Performance',    perf, 70],
            ['Accessibility',  a11y, 80],
            ['Best Practices', bp,   80],
            ['SEO',            seo,  80],
          ];

          const failures = checks.filter(([, score, threshold]) => score < threshold);

          console.log(`Scores — Perf: ${perf} | A11y: ${a11y} | BP: ${bp} | SEO: ${seo}`);
          console.log(`CWV   — LCP: ${lcp}ms | FCP: ${fcp}ms | TBT: ${tbt}ms | CLS: ${cls}`);

          if (!failures.length) {
            console.log('All scores above thresholds — no issue will be created.');
            process.exit(0);
          }

          const sha   = process.env.GITHUB_SHA.slice(0, 7);
          const repo  = process.env.GITHUB_REPOSITORY;
          const runId = process.env.GITHUB_RUN_ID;

          const rows = checks
            .map(([name, score, threshold]) =>
              `| ${name} | ${score} | ${threshold} | ${score >= threshold ? '✅ Pass' : '❌ Fail'} |`
            )
            .join('\n');

          const failList = failures
            .map(([name, score, threshold]) =>
              `- **${name}**: scored ${score}, threshold is ${threshold}`
            )
            .join('\n');

          const body = [
            `## Lighthouse Regression — ${sha}`,
            '',
            `**Commit:** [\`${sha}\`](https://github.com/${repo}/commit/${process.env.GITHUB_SHA})`,
            `**Run:** [View full report](https://github.com/${repo}/actions/runs/${runId})`,
            '',
            '### Scores',
            '',
            '| Category | Score | Threshold | Status |',
            '|----------|-------|-----------|--------|',
            rows,
            '',
            '### Core Web Vitals',
            '',
            `- LCP: ${lcp} ms (target ≤ 2500 ms)`,
            `- FCP: ${fcp} ms (target ≤ 1800 ms)`,
            `- TBT: ${tbt} ms (target ≤ 200 ms)`,
            `- CLS: ${cls} (target ≤ 0.10)`,
            '',
            '### Failed Thresholds',
            '',
            failList,
            '',
            '_Opened automatically by the Lighthouse CI workflow. Close once a passing run is confirmed._',
          ].join('\n');

          fs.writeFileSync('/tmp/lighthouse_report.md', body);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'regression=true\n');
          console.log('Regression detected — issue will be created.');
          EOF

      - name: Open issue on regression
        if: steps.check.outputs.regression == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          gh issue create \
            --title "Lighthouse Regression — ${SHORT_SHA}" \
            --label "lighthouse" \
            --body-file /tmp/lighthouse_report.md

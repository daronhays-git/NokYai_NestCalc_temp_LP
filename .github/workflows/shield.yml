name: Shield Review
on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  shield-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            Read REVIEW.md and .claude/commands/shield.md. Then review the PR diff for:
            1. Security — API key exposure, VITE_ prefix rules, server-side-only external calls
            2. Error Handling — try/catch coverage, no silent catch blocks
            3. Logic — calculation accuracy, state management bugs, race conditions
            4. Performance — React 19 memoization rules, bundle impact
            5. Architecture — module isolation, locked file modifications (flag as Critical)
            Post findings as a PR comment with: File | Line | Severity | Category | Finding | Recommendation
          max_turns: "10"
